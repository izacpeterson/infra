services:
  caddy:
    image: caddy:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config

  izacdotcomapi:
    build:
      context: /home/ubuntu/izacdotcomapi
      dockerfile: /home/ubuntu/infra/compose/izacdotcomapi/Dockerfile
    restart: unless-stopped
    env_file: /home/ubuntu/izacdotcomapi/.env

volumes:
  caddy_data:
  caddy_config:
